# ─────────────────────────────────────────────────────────────────
# CI Pipeline — SA Bank Trust Score
# Runs on every push to main to protect the live Streamlit app.
# Author: Lindiwe Songelwa
# Org:    AZ400-DevOps-Portfolio
# ─────────────────────────────────────────────────────────────────

name: CI — App Health Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  health-check:
    name: App Health Check
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the code ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Syntax check — app.py ──────────────────────────────
      - name: Syntax check — app.py
        run: python -m py_compile app.py && echo "✅ app.py syntax OK"

      # ── 5. Syntax check — Compare Banks page ──────────────────
      - name: Syntax check — Compare Banks page
        run: python -m py_compile pages/1_Compare_Banks.py && echo "✅ Compare Banks syntax OK"

      # ── 6. Verify data files exist ────────────────────────────
      - name: Verify data files exist
        run: |
          python - <<EOF
          import os
          files = [
              "data/complaints.csv",
              "data/sanctions.csv",
              "data/sentiment.csv"
          ]
          missing = [f for f in files if not os.path.exists(f)]
          if missing:
              print(f"❌ Missing data files: {missing}")
              exit(1)
          print("✅ All data files present")
          EOF

      # ── 7. Validate requirements.txt ─────────────────────────
      - name: Validate requirements.txt
        run: |
          python - <<EOF
          with open("requirements.txt") as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith("#")]
          print(f"✅ requirements.txt has {len(lines)} packages — no conflicts detected")
          for line in lines:
              print(f"   · {line}")
          EOF
